name: Build TV Remote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Code checkout karein (Upgraded to v4)
      - uses: actions/checkout@v4

      # 2. JDK 17 Setup karein (Upgraded to v4)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradlew file ko executable permission dein
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. APK Build karein
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. APK Upload karein (Upgraded to v4 - Error Fixed)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVRemote-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
